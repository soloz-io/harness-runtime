services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waypoint
      POSTGRES_PASSWORD: waypoint
      POSTGRES_DB: waypoint_test
    ports:
      - "5433:5432"
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waypoint"]
      interval: 1s
      timeout: 3s
      retries: 10
