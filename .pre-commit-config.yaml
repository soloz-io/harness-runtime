repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: ruff check .
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format check
        entry: ruff format --check .
        language: system
        types: [python]
        pass_filenames: false

      - id: ty-check
        name: ty typecheck core/
        entry: uv run ty check core/
        language: system
        types: [python]
        pass_filenames: false
