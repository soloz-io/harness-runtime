name: harness-runtime

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish.yml"
      - "pyproject.toml"
      - "cli.py"
      - "api/**"
      - "core/**"
      - "models/**"
      - "tests/**"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "cli.py"
      - "api/**"
      - "core/**"
      - "models/**"
      - "tests/**"
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: waypoint
          POSTGRES_PASSWORD: waypoint
          POSTGRES_DB: waypoint_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: sudo apt-get update && sudo apt-get install -y redis-server
      - run: pip install -e ".[dev]"
      - run: redis-server --daemonize yes --port 6379

      - name: Run all integration tests
        run: PYTHONPATH=. pytest tests/ -v
        env:
          DATABASE_URL: postgresql://waypoint:waypoint@localhost:5433/waypoint_test
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs
          path: log/
          retention-days: 7

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/harness-runtime
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-test-pypi:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/harness-runtime
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
